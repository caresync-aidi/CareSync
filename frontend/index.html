<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareSync</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        (function () {
            const saved = localStorage.getItem("theme");
            if (saved === "dark") document.documentElement.setAttribute("data-theme", "dark");
        })();

        function toggleDarkMode() {
            const isDark = document.documentElement.getAttribute("data-theme") === "dark";
            if (isDark) {
                document.documentElement.removeAttribute("data-theme");
                localStorage.setItem("theme", "light");
            } else {
                document.documentElement.setAttribute("data-theme", "dark");
                localStorage.setItem("theme", "dark");
            }
        }
    </script>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen">
        <div class="glass-panel login-container">
            <div class="logo-icon">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>
            <h1 class="login-title">CareSync</h1>
            <p class="login-subtitle">AI Recovery & Nutrition Assistant</p>
            
            <div class="input-group">
                <label>Email</label>
                <input id="email" type="email" class="text-input" value="user@caresync.com">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input id="password" type="password" class="text-input" value="caresync123">
            </div>
            
            <button onclick="login()" class="btn-primary">Sign In</button>
        </div>
    </div>

    <!-- PORTAL SCREEN -->
    <div id="portal" class="screen hidden">
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fa-solid fa-heart-pulse"></i> CareSync
            </div>
            <div class="nav-actions">
                <button class="icon-btn" onclick="toggleDarkMode()"><i class="fa-solid fa-moon"></i></button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </nav>

        <div class="portal-content">
            
            <!-- CHAT INTERFACE -->
            <div id="chat" class="glass-panel chat-container">
                <div id="messages" class="messages"></div>
                
                <div class="chat-input-area">
                    <input id="user-input" class="text-input" placeholder="Type your answer here..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendAnswer()" class="send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>

            <!-- RESULTS INTERFACE -->
            <div id="results" class="glass-panel report-container hidden">
                <div class="report-header">
                    <h2>Your CareSync Report</h2>
                    <p>AI-Generated Health Insights</p>
                </div>
                
                <div class="report-metrics">
                    <div class="metric-card recovery">
                        <h3 id="res-recovery">--</h3>
                        <p>Estimated Recovery</p>
                    </div>
                    <div class="metric-card diet">
                        <h3 id="res-diet">--</h3>
                        <p>Recommended Diet</p>
                    </div>
                </div>

                <div id="report-content" class="report-body"></div>
                
                <div class="report-actions">
                    <button onclick="downloadPDF()" class="btn-secondary success">
                        <i class="fa-solid fa-file-pdf"></i> Download PDF
                    </button>
                    <button onclick="copyShareLink()" class="btn-secondary">
                        <i class="fa-solid fa-link"></i> Share Link
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const questions = [
            { id:"age", q:"What is your age?", hint:"(Enter your age in years, e.g. 25)" },
            { id:"sex", q:"What is your biological sex?", hint:"(Enter Male or Female)" },
            { id:"weight", q:"What is your current weight?", hint:"(Enter your weight in kg, e.g. 70)" },
            { id:"height", q:"What is your height?", hint:"(Enter your height in cm, e.g. 175)" },
            { id:"condition_type", q:"What condition are you experiencing?", hint:"(Enter Cold, Flu, Fever, Headache, Cough, Sore Throat, or Stomach Ache)" },
            { id:"severity_score", q:"How severe are your symptoms on a scale of 0 to 10?", hint:"(Enter a number from 0 to 10)" },
            { id:"diabetic", q:"Are you diabetic?", hint:"(Enter Yes or No)" },
            { id:"exercise", q:"Do you exercise regularly?", hint:"(Enter Yes or No)" },
            { id:"alcohol_units", q:"How many alcohol units do you consume per week roughly?", hint:"(Enter a number, e.g. 5)" },
            { id:"sleep_hours", q:"How many hours do you sleep per night on average?", hint:"(Enter a number, e.g. 7)" },
            { id:"medication_adherence", q:"Are you adhering to your prescribed medication?", hint:"(Enter 1 for Yes, 0 for No)" },
            { id:"smoking_status", q:"What is your smoking status?", hint:"(Enter Never, Former, or Current)" },
            { id:"daily_steps", q:"What is your average daily step count?", hint:"(Enter a number, e.g. 8000)" }
        ];

        let i = 0;
        let answers = {};
        // Adjust for Vercel relative path if deployed, or local FastAPI
        let API = window.location.hostname === 'localhost' ? "http://localhost:8000" : "";
        let sid = null;

        function login() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("portal").classList.remove("hidden");
            addMsg("Hello! I am your CareSync AI assistant. I'll ask you a few simple questions to generate your personalized recovery and nutrition report.", "bot");
            setTimeout(ask, 1500);
        }

        function logout() { location.reload(); }

        function scrollToBottom() {
            const msgs = document.getElementById("messages");
            msgs.scrollTop = msgs.scrollHeight;
        }

        function addMsg(text, type, hint="") {
            const div = document.createElement("div");
            div.className = `msg-wrapper ${type}`;
            
            let innerHtml = `<div class="msg-bubble">`;
            if(type === "bot") {
                innerHtml += `<b>CareSync AI</b>${text}`;
                if(hint) innerHtml += `<div class="hint">${hint}</div>`;
            } else {
                innerHtml += `${text}`;
            }
            innerHtml += `</div>`;
            
            div.innerHTML = innerHtml;
            document.getElementById("messages").appendChild(div);
            scrollToBottom();
        }

        function showTyping() {
            const div = document.createElement("div");
            div.className = `msg-wrapper bot typing`;
            div.id = "typing-indicator";
            div.innerHTML = `
                <div class="msg-bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>`;
            document.getElementById("messages").appendChild(div);
            scrollToBottom();
        }

        function removeTyping() {
            const el = document.getElementById("typing-indicator");
            if(el) el.remove();
        }

        function validate(id, value) {
            value = value.trim().toLowerCase();
            const numberFields = ["age", "weight", "height", "severity_score", "alcohol_units", "sleep_hours", "daily_steps"];
            
            if(numberFields.includes(id)) {
                if(isNaN(value) || value === "") return false;
                return true;
            }
            if(id === "medication_adherence") {
                if(!["0", "1"].includes(value)) return false;
                return true;
            }
            if(id === "diabetic" || id === "exercise") {
                if(!["yes", "no"].includes(value)) return false;
                return true;
            }
            if(id === "sex") {
                if(!["male", "female"].includes(value)) return false;
                return true;
            }
            if(id === "smoking_status") {
                if(!["never", "former", "current"].includes(value)) return false;
                return true;
            }
            if(id === "condition_type") {
                const validConditions = ["cold", "flu", "fever", "headache", "cough", "sore throat", "stomach ache"];
                if(!validConditions.includes(value)) return false;
                return true;
            }
            return true;
        }

        function ask() {
            if(i >= questions.length) {
                submit();
                return;
            }
            showTyping();
            setTimeout(() => {
                removeTyping();
                const q = questions[i];
                addMsg(q.q, "bot", q.hint);
            }, 800);
        }

        function handleKeyPress(e) {
            if(e.key === 'Enter') sendAnswer();
        }

        function sendAnswer() {
            const input = document.getElementById("user-input");
            let val = input.value.trim();
            if(!val) return;

            addMsg(val, "user");
            input.value = "";

            if(!validate(questions[i].id, val)) {
                showTyping();
                setTimeout(() => {
                    removeTyping();
                    addMsg("Invalid input. Please try again.", "bot");
                    setTimeout(ask, 800);
                }, 600);
                return;
            }

            answers[questions[i].id] = val;
            i++;
            ask();
        }

        async function submit() {
            showTyping();
            try {
                const res = await fetch(`${API}/api/predict`, {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify(answers)
                });
                const data = await res.json();
                
                removeTyping();
                document.getElementById("chat").classList.add("hidden");
                document.getElementById("results").classList.remove("hidden");
                
                document.getElementById("res-recovery").innerText = `${data.recovery_days} Days`;
                document.getElementById("res-diet").innerText = data.diet_plan;
                
                // Use innerHTML instead of innerText because the backend markdown formatting is returned
                let reportHtml = data.report.replace(/\n/g,"<br>");
                // Quick markdown bold to HTML bold
                reportHtml = reportHtml.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                document.getElementById("report-content").innerHTML = reportHtml;
                
                sid = data.share_id;
            } catch (err) {
                removeTyping();
                addMsg("An error occurred while generating your report.", "bot");
            }
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            let text = document.getElementById("report-content").innerText;
            
            doc.setFontSize(22);
            doc.text("CareSync Report", 105, 20, null, null, "center");
            
            doc.setFontSize(12);
            let y = 40;
            
            let metrics = `Estimated Recovery: ${document.getElementById("res-recovery").innerText}\nRecommended Diet: ${document.getElementById("res-diet").innerText}`;
            doc.text(metrics, 10, y);
            y += 20;
            
            let lines = doc.splitTextToSize(text, 180);
            lines.forEach(line => {
                if(y > 280) {
                    doc.addPage();
                    y = 20;
                }
                doc.text(line, 10, y);
                y += 7;
            });
            
            doc.save("CareSync_Report.pdf");
        }

        function copyShareLink() {
            if(!sid) return;
            let link = `${window.location.origin}/report/${sid}`;
            if(API) link = `${API}/report/${sid}`;
            navigator.clipboard.writeText(link);
            
            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-check"></i> Copied!`;
            btn.classList.add("success");
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.classList.remove("success");
            }, 2000);
        }
    </script>
</body>
</html>
